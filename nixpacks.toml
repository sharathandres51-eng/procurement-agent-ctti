# nixpacks.toml
# -------------
# Nixpacks build config for Railway.
# Proposal ingestion runs at application startup (FastAPI lifespan),
# not at build time — no build phase needed.

[phases.setup]
nixPkgs = ["python313"]

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install --no-cache-dir -r requirements.txt"
]

[start]
cmd = "/app/.venv/bin/uvicorn api.main:app --host 0.0.0.0 --port $PORT"
